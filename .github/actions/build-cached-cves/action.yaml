# This configuration file defines a GitHub Action named "Build with cached CVEs".
# This action is used when a build fails with the exit code 7. The action downloads the latest CVEs artifact from the "post_release.yaml" workflow.
# The action then unpacks the downloaded CVEs data in the correct folders and re-runs the build with the downloaded CVEs data.
# This is useful in scenarios where the Security API is experiencing issues or a CVE is breaking the build.

name: "Build with cached CVEs"
inputs:
  gh-token:
    description: "GitHub Token for authentication"
    required: true
  slack-webhook:
    description: "Slack Webhook URL for fallback notification"
    required: false
outputs:
  build-exit-code:
    description: "Exit code from the fallback build."
    value: ${{ steps.build.outputs['build-exit-code'] }}

runs:
  using: "composite"
  steps:
    - name: Install jq (JSON processor) if not found
      run: |
        if ! command -v jq &> /dev/null; then
          sudo apt-get update
          sudo apt-get install -y jq
        else
          echo "jq is already installed. Skipping install..."
        fi
      shell: bash

    - name: Download CVE Data
      run: |
        # Find the most recent runs that still have non-expired CVE artifacts.
        # post_release.yaml runs as a reusable workflow, so its artifacts are filed under the
        # caller (release.yaml), not under "post_release.yaml". Look each artifact up by name
        # across all workflows rather than by workflow name, and skip expired ones so we never
        # resolve a run whose artifacts have already passed their retention window.
        sb_run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=security-bulletins&per_page=100" \
          --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id')
        pc_run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=pack-cves&per_page=100" \
          --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id')
        if [ -z "$sb_run" ] || [ "$sb_run" = "null" ] || [ -z "$pc_run" ] || [ "$pc_run" = "null" ]; then
          echo "::error::No non-expired security-bulletins or pack-cves artifact found to fall back to."
          exit 1
        fi
        echo "Fetching security-bulletins from run $sb_run and pack-cves from run $pc_run"
        # Remove any downloaded artifacts, should they exist.
        rm -rf ./downloaded_artifacts
        # Download the latest artifacts to a new dir.
        gh run download ${sb_run} --name security-bulletins --dir ./downloaded_artifacts/security-bulletins
        gh run download ${pc_run} --name pack-cves --dir ./downloaded_artifacts/pack-cves
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}

    - name: Unpack CVE data
      run: |
        # Ensure the correct folders exist.
        mkdir -p .docusaurus/security-bulletins/default
        mkdir -p .docusaurus/pack-cves/default
        # Move the files to their correct places in the checked out repository
        mv downloaded_artifacts/security-bulletins/data.json .docusaurus/security-bulletins/default/data.json
        mv downloaded_artifacts/pack-cves/data.json .docusaurus/pack-cves/default/data.json
        rm -rf downloaded_artifacts
      shell: bash

    - name: Build
      id: build
      run: |
        rm -rf build
        set +e
        npm run build
        exit_code=$?
        set -e
        printf 'build-exit-code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
        exit "$exit_code"
      shell: bash

    - name: Slack Notification
      if: ${{ failure() && steps.build.outputs['build-exit-code'] != '0' }}
      uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
      env:
        SLACK_WEBHOOK: ${{ inputs.slack-webhook }}
        SLACK_USERNAME: "spectromate"
        SLACK_ICON_EMOJI: ":robot_panic:"
        SLACK_COLOR: ${{ job.status }}
        SLACKIFY_MARKDOWN: true
        ENABLE_ESCAPES: true
        SLACK_MESSAGE: |
          :warning: The build failed due to an error fetching CVE data from the Security API.

          A fallback build was attempted using the last known good CVE data from the `post_release.yaml` workflow.

          *This may mean there are issues with the API or with a new CVE.*

          Please review the [build logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

          _This message was generated by the fallback workflow: "Build with cached CVEs"._
