
name: "Generate Component Updates"

on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: "The Jira ticket for the component update (e.g., DOC-2815)"
        required: true
      release_date:
        description: "The release date for the component update (e.g., May 20, 2026)"
        required: true
      release_management_appliance:
        description: "The release management appliance for the component update (e.g., 4.8.6)"
        required: true
      release_artifact_studio:
        description: "The release artifact studio for the component update (e.g., 4.8.6)"
        required: true
      release_terraform_version:
        description: "The release terraform version for the component update (e.g., 0.28.1)"
        required: true
      base_branch:
        description: "The base branch for the component update PR (default: master)"
        required: true
        default: "master"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
  SUPER_API_TOKEN: ${{ secrets.SUPER_API_TOKEN }}
  NODE_VERSION: "24"
  JIRA_TICKET: ${{ github.event.inputs.jira_ticket }}
  RELEASE_DATE: ${{ github.event.inputs.release_date }}
  RELEASE_MANAGEMENT_APPLIANCE: ${{ github.event.inputs.release_management_appliance }}
  RELEASE_ARTIFACT_STUDIO: ${{ github.event.inputs.release_artifact_studio }}
  RELEASE_TERRAFORM_VERSION: ${{ github.event.inputs.release_terraform_version }}
  BASE_BRANCH: ${{ github.event.inputs.base_branch }}
  ALGOLIA_APP_ID: "123456789"
  ALGOLIA_INDEX_NAME: "123456789"
  ALGOLIA_SEARCH_KEY: "123456789"

jobs:
  generate_component_updates:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Retrieve Credentials
        id: import-secrets
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: https://vault.prism.spectrocloud.com
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: /providers/github/organizations/spectrocloud/token?org_name=spectrocloud token | VAULT_GITHUB_TOKEN

      - name: Checkout Librarium Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with: 
          repository: spectrocloud/librarium
          ref: ${{ env.BASE_BRANCH }}
          token: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
  
      - name: Set Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm" 

      - run: |
          npm ci
      
      - name: Execute Script to Generate Component Updates
        run: |
          touch .env
          JIRA_TICKET="${{ env.JIRA_TICKET }}" RELEASE_DATE="${{ env.RELEASE_DATE }}" RELEASE_MANAGEMENT_APPLIANCE="${{ env.RELEASE_MANAGEMENT_APPLIANCE }}" RELEASE_ARTIFACT_STUDIO="${{ env.RELEASE_ARTIFACT_STUDIO }}" RELEASE_TERRAFORM_VERSION="${{ env.RELEASE_TERRAFORM_VERSION }}" make generate-component-updates

      - name: Create a PR with generated component updates
        env:
          GH_TOKEN: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
        run: |
          # Create a new branch
          branch_name="${{ env.JIRA_TICKET }}-generate-component-updates-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$branch_name"

          # Commit and push the changes
          git add docs/docs-content/release-notes/release-notes.md
          git commit -m "docs: add component updates for ${{ env.JIRA_TICKET }}"
          git push origin $branch_name

          # Create the pull request
          pr_body='
          ## Describe the Change
          This PR adds the component updates for the Jira ticket `${{ env.JIRA_TICKET }}` to the `release-notes.md` file.'
          output=$(gh pr create --base "${{ env.BASE_BRANCH }}" --title "docs: add component updates for ${{ env.JIRA_TICKET }}" --body "$pr_body")
          pr_url=$(echo "$output" | grep -o "https://[^ ]*")
          echo "PR successfully created $pr_url."

          # Save the PR URL as an environment variable
          echo "GITHUB_COMPONENT_UPDATES_PR=$pr_url" >> $GITHUB_ENV

      - name: Success Slack Notification
        if: ${{ env.GITHUB_COMPONENT_UPDATES_PR  != ''}}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_PRIVATE_TEAM_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACKIFY_MARKDOWN: true
          ENABLE_ESCAPES: true
          SLACK_MESSAGE: 'A new PR with component updates was created for Jira ticket `${{ env.JIRA_TICKET }}`. Please review ${{env.GITHUB_COMPONENT_UPDATES_PR}} for more details.'

      - name: Failure Slack Notification
        if: ${{ failure() }}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_PRIVATE_TEAM_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACKIFY_MARKDOWN: true
          ENABLE_ESCAPES: true
          SLACK_MESSAGE: 'The generate component updates job for Jira ticket `${{ env.JIRA_TICKET }}` in `${{ github.repository }}` failed. [View details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
