name: "Update Component Updates"

on:
  issue_comment:
    types: [created]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
  SUPER_API_TOKEN: ${{ secrets.SUPER_API_TOKEN }}
  NODE_VERSION: "24"
  BASE_BRANCH: ${{ format('refs/pull/{0}/head', github.event.issue.number) }}  
  ALGOLIA_APP_ID: "123456789"
  ALGOLIA_INDEX_NAME: "123456789"
  ALGOLIA_SEARCH_KEY: "123456789"

jobs:
  update_component_updates:
    if: >
      github.event.issue.pull_request &&
      !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check trigger condition
        id: check
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          BODY_LOWER=$(echo "$COMMENT_BODY" | tr '[:upper:]' '[:lower:]')

          if [[ "$BODY_LOWER" == *"update component updates"* ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Retrieve Credentials
        if: steps.check.outputs.run == 'true'
        id: import-secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: https://vault.prism.spectrocloud.com
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: /providers/github/organizations/spectrocloud/token?org_name=spectrocloud token | VAULT_GITHUB_TOKEN

      - name: Checkout Librarium Repository
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with: 
          repository: spectrocloud/librarium
          ref: ${{ env.BASE_BRANCH }}
          token: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
      
      - name: Set Git User
        if: steps.check.outputs.run == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js environment
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm" 

      - name: Install Dependencies
        if: steps.check.outputs.run == 'true'
        run: |
          npm ci

      - name: Extract component updates variables
        if: steps.check.outputs.run == 'true'
        run: |
          TICKET=$(grep -m1 -E '<!-- COMPONENT UPDATES TICKET: [A-Z]+-[0-9]+ -->' docs/docs-content/release-notes/release-notes.md \
            | sed -E 's/.*COMPONENT UPDATES TICKET: ([A-Z]+-[0-9]+).*/\1/')
          DATE=$(
            grep -m1 -E '<!-- RELEASE DATE: [A-Za-z]+ [0-9]{1,2}, [0-9]{4} -->' docs/docs-content/release-notes/release-notes.md \
            | sed -E 's/.*RELEASE DATE: ([A-Za-z]+ [0-9]{1,2}, [0-9]{4}).*/\1/'
          )
          APPLIANCE=$(
            grep -m1 -E '<!-- RELEASE MANAGEMENT APPLIANCE: [A-Za-z0-9._-]+ -->' docs/docs-content/release-notes/release-notes.md \
            | sed -E 's/.*RELEASE MANAGEMENT APPLIANCE: ([A-Za-z0-9._-]+).*/\1/'
          )
          ARTIFACT=$(
            grep -m1 -E '<!-- RELEASE ARTIFACT STUDIO: [A-Za-z0-9._-]+ -->' docs/docs-content/release-notes/release-notes.md \
            | sed -E 's/.*RELEASE ARTIFACT STUDIO: ([A-Za-z0-9._-]+).*/\1/'
          )
          TERRAFORM=$(
            grep -m1 -E '<!-- RELEASE TERRAFORM VERSION: [A-Za-z0-9._-]+ -->' docs/docs-content/release-notes/release-notes.md \
            | sed -E 's/.*RELEASE TERRAFORM VERSION: ([A-Za-z0-9._-]+).*/\1/'
          )

          if [[ -z "$TICKET" ]]; then
            echo "❌ No COMPONENT UPDATES TICKET found" >&2
            exit 1
          fi
          if [[ -z "$DATE" ]]; then
            echo "❌ No RELEASE DATE found" >&2
            exit 1
          fi
          if [[ -z "$APPLIANCE" ]]; then
            echo "❌ No RELEASE MANAGEMENT APPLIANCE found" >&2
            exit 1
          fi
          if [[ -z "$ARTIFACT" ]]; then
            echo "❌ No RELEASE ARTIFACT STUDIO found" >&2
            exit 1
          fi
          if [[ -z "$TERRAFORM" ]]; then
            echo "❌ No RELEASE TERRAFORM VERSION found" >&2
            exit 1
          fi

          {
            echo "JIRA_TICKET=$TICKET"
            echo "RELEASE_DATE<<EOF"
            echo "$DATE"
            echo "EOF"
            echo "RELEASE_MANAGEMENT_APPLIANCE=$APPLIANCE"
            echo "RELEASE_ARTIFACT_STUDIO=$ARTIFACT"
            echo "RELEASE_TERRAFORM_VERSION=$TERRAFORM"
          } >> "$GITHUB_ENV"
      
      - name: Execute Script to Generate Component Updates
        if: steps.check.outputs.run == 'true' && env.JIRA_TICKET != ''
        env:
          JIRA_TICKET: ${{ env.JIRA_TICKET }}
          RELEASE_DATE: ${{ env.RELEASE_DATE }}
          RELEASE_MANAGEMENT_APPLIANCE: ${{ env.RELEASE_MANAGEMENT_APPLIANCE }}
          RELEASE_ARTIFACT_STUDIO: ${{ env.RELEASE_ARTIFACT_STUDIO }}
          RELEASE_TERRAFORM_VERSION: ${{ env.RELEASE_TERRAFORM_VERSION }}
        run: |
          touch .env
          make generate-component-updates

      - name: Get PR branch
        if: steps.check.outputs.run == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
        run: |
          BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq .headRefName)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.check.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
        run: |
          git add docs/docs-content/release-notes/release-notes.md

          if git diff --cached --quiet; then
            echo "ℹ️  No release notes changes to commit."
            exit 0
          fi

          git commit -m "docs: update component updates"
          git push origin HEAD:${{ steps.pr.outputs.branch }}

      - name: Comment on PR if commit fails
        if: steps.check.outputs.run == 'true' && failure() && github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="❌ Failed to update component updates. Please check the workflow logs."
