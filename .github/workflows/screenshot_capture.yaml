# This workflow is triggered by the "Release to Production" workflow or when manually triggered.
# The primary purpose of this workflow is to take screenshots of the website using Playwright and upload them as artifacts.
# The screenshots can be used to compare the visual appearance of the website before and after a release.
# The workflow Visual Comparison uses these screenshots to generate a visual comparison report.
# Playwright configuration is stored in the playwright.config.js file in the root of the repository. 
# The custom Playwright logic can be found in the visuals/ directory of the repository.
# This workflow supports on-demand execution using the workflow_dispatch event.

name: Screenshot Capture


on:
  workflow_call:
  workflow_dispatch:



env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FULLSTORY_ORGID: ${{ secrets.FULLSTORY_ORGID }}
  ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
  ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
  ALGOLIA_SEARCH_KEY: ${{ secrets.ALGOLIA_SEARCH_KEY }}
  ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
  PALETTE_API_KEY: ${{ secrets.PALETTE_API_KEY }}
  DISABLE_PACKS_INTEGRATIONS: ${{ secrets.DISABLE_PACKS_INTEGRATIONS }}
  DISABLE_SECURITY_INTEGRATIONS: ${{ secrets.DISABLE_SECURITY_INTEGRATIONS }}
  SHOW_LAST_UPDATE_TIME: ${{ secrets.SHOW_LAST_UPDATE_TIME }}
  DSO_AUTH_TOKEN: ${{ secrets.DSO_AUTH_TOKEN }}
  SEERS_CMP_KEY: ${{ secrets.SEERS_CMP_KEY }}
  NODE_VERSION: "24"


jobs:

  create-assets:
    name: asset-builds
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js Environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      # Split the apt step (--with-deps) from the browser download so a stall is
      # attributable in the logs. Both are time-boxed so a hung apt/dpkg lock or a
      # stalled CDN download fails fast instead of running to the 6h job ceiling.
      - name: Install Playwright system dependencies
        timeout-minutes: 10
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: npx playwright install chromium

      - name: Build
        run: |
          touch .env
          make build-ci
      
      - name: Build with cached packs
        id: cached_packs
        if: ${{ env.BUILD_EXIT_CODE == '5' }}
        uses: ./.github/actions/build-cached-packs
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with cached CVEs
        id: cached_cves
        if: ${{ env.BUILD_EXIT_CODE == '7' }}
        uses: ./.github/actions/build-cached-cves
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build
        if: ${{ env.BUILD_EXIT_CODE == '0' || steps.cached_packs.outputs['build-exit-code'] == '0' || steps.cached_cves.outputs['build-exit-code'] == '0' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "build"
          path: |
            build/
          if-no-files-found: error
          retention-days: 1


  visual-snapshots:
    runs-on: ubuntu-latest
    needs: [create-assets]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js Environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with: 
            command: npm ci
            attempt_limit: 3
            attempt_delay: 60000 # 1 minute

      - name: Install Playwright system dependencies
        timeout-minutes: 10
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: npx playwright install chromium

      - name: retry action
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with: 
          attempt_limit: 3
          action: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
          with: |
            name: build
            path: build
          attempt_delay: 60000 # 1 minute

      - name: Take Screenshots with Playwright
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} || exit 0

      - name: Upload Screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        id: screenshots
        with:
          name: screenshots-${{ matrix.shardIndex }}
          path: |
            screenshots/
          if-no-files-found: error
          retention-days: 1

  merge-snapshots:
    name: Merge Screenshots
    runs-on: ubuntu-latest
    needs: [visual-snapshots]
    timeout-minutes: 30
    steps:

    - name: Download blob reports from GitHub Actions Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        path: screenshots
        pattern: screenshots-*
        merge-multiple: true

    - name: Upload Screenshots
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      id: screenshots
      with:
        name: "screenshots"
        path: |
          screenshots/
        if-no-files-found: error
        retention-days: 3
